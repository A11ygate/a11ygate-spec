name: Secret Scan

on:
  push:
    branches: ["main", "spec/*", "ops/*"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for pre-commit scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  public-artifact-gate:
    name: Public artifact gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for banned content in public artifacts
        run: |
          FAIL=0
          BANNED_PATTERNS=(
            "ag_sk_"                   # SealForge API key prefix
            "4b13e21f01d238f466"       # CF account ID fragment
            "03615415-69b6"            # sigwell-ops D1 ID fragment
            "AIRTABLE_BASE_ID.*app"    # Airtable base IDs
            "wrangler secret"          # secret management commands
          )
          FILES=$(find . -type f \( -name "*.md" -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" \) \
            ! -path "./.github/*" ! -path "*/node_modules/*")

          for f in $FILES; do
            for pat in "${BANNED_PATTERNS[@]}"; do
              if grep -qE "$pat" "$f" 2>/dev/null; then
                echo "❌ Banned pattern '$pat' found in: $f"
                grep -nE "$pat" "$f"
                FAIL=1
              fi
            done
          done

          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "Public artifact gate FAILED. Review files above before pushing."
            exit 1
          fi

          echo "✅ Public artifact gate passed"
